# CSA対局クライアント設定例
# 使い方: cargo run -p rshogi-csa-client --release -- csa_client_example.toml

[server]
host = "wdoor.c.u-tokyo.ac.jp"
port = 4081
id = "rshogi_v1"
password = "your_password_here"
floodgate = true

[server.keepalive]
tcp = true
ping_interval_sec = 60

[engine]
path = "./target/release/rshogi-usi"
startup_timeout_sec = 30

[engine.options]
USI_Hash = 1024
Threads = 4
# USI_Ponder は [game] の ponder=true で自動設定されます
# その他のエンジン固有オプション:
# EvalFile = "/path/to/nn.bin"
# BookFile = "no_book"

[time]
# 秒読み(byoyomi)から差し引く安全マージン(ms)。bestmove がサーバ deadline 前に
# 届くよう csa_client 層で byoyomi を削ってエンジンに渡す(btime/wtime は満額)。
# rshogi-usi 等エンジン側に NetworkDelay/NetworkDelay2 がある場合は予約が二重に
# 効き実効思考時間がさらに縮むので、片方を小さくして二重計上を避ける。自前の
# 遅延予約を持たないエンジンでは margin_msec が唯一の安全弁になるため 0 にしない。
margin_msec = 1500

[game]
max_games = 0              # 0 = 無制限
restart_engine_every_game = false
ponder = true

[retry]
initial_delay_sec = 10
max_delay_sec = 900

[record]
enabled = true
dir = "./records"
filename_template = "{datetime}_{sente}_vs_{gote}"
save_csa = true
save_sfen = true

[log]
level = "info"
dir = "./logs"
stdout = true
