# Cloudflare Workers (rshogi-csa-server-workers) の自動デプロイ workflow。
#
# 環境 2 系統:
#   - staging   : `main` への push で自動 deploy（軽量 canary）
#   - production: `workflow_dispatch` で `target = production` を選んだ時のみ deploy
#                 （誤実行を防ぐため push trigger では絶対に走らない）
#
# `workflow_dispatch` で `target = staging` を選ぶと staging への手動 redeploy
# として動く。production は同 dispatch の choice 入力でのみ起動可能。
#
# Cloudflare 側 secrets が未設定の段階では各 deploy job 先頭の credential check
# step で `can_deploy=false` に倒し、後続 step を skip して job 自体は green で
# 抜ける（merge を block しない、secrets 設定後の最初の push or dispatch で実
# deploy が走る）。
#
# secrets / variables は GitHub Environments
# (`rshogi-csa-server-workers-staging` / `rshogi-csa-server-workers-production`)
# ごとに登録する設計:
#   - secrets   : `CLOUDFLARE_API_TOKEN` / `CLOUDFLARE_ACCOUNT_ID`
#   - variables : `WORKERS_HEALTH_URL` (`/health` endpoint URL、未設定なら smoke step が
#                 warning を出して即 exit 0 で済ませる）
# 各 deploy job 1 本だけが `environment:` を宣言することで、その環境に紐付いた値
# だけが注入され（staging job が production token を取れない gating になる）、
# かつ Required reviewers を有効化したときに **1 dispatch あたり 1 回の承認操作で
# preflight / deploy / smoke 全 step が走る** 構造を維持する。
# Environment 名に crate prefix (`rshogi-csa-server-workers-`) を付けるのは、
# 同 repository 内の他 crate (例: TCP server) が将来別 staging を持っても
# 名前衝突しないようにするため。
#
# 初回セットアップ・rollback・トラブルシューティングは
# `docs/csa-server/deployment.md` を参照。

name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'crates/rshogi-csa-server-workers/**'
      - 'crates/rshogi-csa-server/**'
      - 'crates/rshogi-csa/**'
      - 'crates/rshogi-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target environment'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      # production deploy 時に drain step を bypass する緊急経路。
      # `force_deploy_reason` が必須 (空 reject)。誤用防止のため Step Summary に
      # banner を出し、`::warning::` で workflow log にも reason を残す。
      # staging job では参照しない (canary 用途で drain 自体無し)。
      force_deploy:
        description: 'Bypass drain check (emergency hotfix only). Requires force_deploy_reason.'
        type: boolean
        default: false
      force_deploy_reason:
        description: 'Required when force_deploy=true. Will appear in audit log and Step Summary.'
        type: string
        default: ''
      # production drain step の per-deploy override。default 3900s ≈ 65min は
      # production CLOCK 上限 (`total_time*2 + byoyomi*max_moves`) + 余裕。
      # 詳細は docs/csa-server/deployment.md §12 参照。
      drain_max_wait_sec:
        description: 'Max wait seconds for drain (default 3900 ≈ 65min worst-case game time).'
        type: number
        default: 3900

# 同時 deploy を防ぐ。途中キャンセルすると build/upload 中の wrangler が中途半端な
# 状態で止まる可能性があるため、`cancel-in-progress: false` で進行中 deploy は
# 必ず完走させる。`push` 由来の staging deploy と `workflow_dispatch (target=production)`
# 由来の production deploy は group 名が `deploy-workers-staging` /
# `deploy-workers-production` と分かれるので、staging 自動 deploy が走っている
# 最中でも production への dispatch を遮らずに並走できる。
concurrency:
  group: deploy-workers-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: false

jobs:
  # ---------- staging --------------------------------------------------------
  # `push` (= 自動 canary) と `workflow_dispatch` (target=staging) の両方で起動。
  # production secrets には触れない（GitHub Environments の解決により staging
  # environment 側に登録された値だけが注入される）。
  #
  # preflight (credentials check) → deploy → smoke の 3 段階を 1 job 内の step
  # として直列実行する。`environment:` 宣言は本 job 1 つだけに付けるため、Required
  # reviewers を有効化しても 1 dispatch につき 1 回の承認で全 step が走る。
  # secrets 未設定の場合は credential check step が `can_deploy=false` を出力し、
  # 後続 step は `if: steps.check.outputs.can_deploy == 'true'` で skip されて
  # job 自体は green で抜ける（既存の fail-safe を維持）。
  deploy-staging:
    name: Deploy to Cloudflare Workers (staging)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: rshogi-csa-server-workers-staging
    env:
      # workflow 上位の `-C target-cpu=x86-64-v2` (rust-ci.yml の env) を継承しない
      # ように明示空文字。本 workflow は独立しているが、将来 workflow_call で連結
      # された場合の defensive な設定。wasm32 ビルドでは x86 専用フラグが warning
      # を大量に出すため。
      RUSTFLAGS: ""
    steps:
      - name: Check Cloudflare credentials
        id: check
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$API_TOKEN" && -n "$ACCOUNT_ID" ]]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ staging Cloudflare credentials configured; deploy will proceed."
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⚠️ staging deploy skipped"
              echo
              echo "Environment \`rshogi-csa-server-workers-staging\` の secret \`CLOUDFLARE_API_TOKEN\` / \`CLOUDFLARE_ACCOUNT_ID\` が未設定です。"
              echo
              echo "See \`docs/csa-server/deployment.md\` for initial setup."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::staging deploy skipped (environment secrets not configured)."
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.can_deploy == 'true'
        with:
          # https://github.com/SH11235/rshogi/issues/639: drift detection の基準値となる DEPLOY_TRIGGER_SHA を
          # `git log -1 --format=%H -- <paths>` で計算する。shallow checkout だと
          # 過去の deploy-trigger commit が見えず、新規 PR を merge しても
          # `DEPLOYED_SHA` が空文字で落ちるため full history を取る。
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        if: steps.check.outputs.can_deploy == 'true'
        with:
          toolchain: stable
      - name: Add wasm32 target to pinned toolchain
        if: steps.check.outputs.can_deploy == 'true'
        run: |
          CHANNEL=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "Adding wasm32-unknown-unknown to toolchain $CHANNEL"
          rustup target add --toolchain "$CHANNEL" wasm32-unknown-unknown
      - name: Setup sccache
        if: steps.check.outputs.can_deploy == 'true'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        if: steps.check.outputs.can_deploy == 'true'
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.check.outputs.can_deploy == 'true'
        with:
          shared-key: wasm32
      - name: Verify wrangler.staging.toml exists
        if: steps.check.outputs.can_deploy == 'true'
        run: |
          test -f crates/rshogi-csa-server-workers/wrangler.staging.toml || {
            echo "::error::crates/rshogi-csa-server-workers/wrangler.staging.toml not found."
            echo "::error::Run from main branch with the file committed (see docs/csa-server/deployment.md)."
            exit 1
          }
      # `cargo install` の成果物 (`~/.cargo/bin/worker-build`) は `Swatinem/rust-cache`
      # の対象外なので、`actions/cache` で明示キャッシュする。Hit 時は `cargo install`
      # step を skip して 30〜60 秒短縮する。
      #
      # ⚠️ バージョン更新時の二重管理に注意:
      #   `cargo install worker-build@^0.8` を `^0.9` 系に上げる場合、本キャッシュキー
      #   末尾の `v0.8` も同時に `v0.9` へ更新する必要がある。`v0.8` のままだと
      #   過去 cache が hit して 0.8.x バイナリが使われ続け、新 0.9.x が install
      #   step で skip される。インストールコマンドとキャッシュキーの **2 箇所同時更新** が必須。
      #   本 cache key は `deploy-production` job と共有しているので、bump 時は staging /
      #   production 両方の install コマンド + key 末尾の **計 4 箇所同時更新** が必要。
      - name: Cache worker-build binary
        if: steps.check.outputs.can_deploy == 'true'
        id: cache-worker-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-${{ runner.os }}-${{ runner.arch }}-v0.8
      - name: Install worker-build
        if: steps.check.outputs.can_deploy == 'true' && steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install -q worker-build@^0.8 --locked
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        if: steps.check.outputs.can_deploy == 'true'
        with:
          package_json_file: crates/rshogi-csa-server-workers/package.json
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check.outputs.can_deploy == 'true'
        with:
          node-version-file: crates/rshogi-csa-server-workers/.node-version
          cache: 'pnpm'
          cache-dependency-path: crates/rshogi-csa-server-workers/pnpm-lock.yaml
      - name: Install Node deps (wrangler)
        if: steps.check.outputs.can_deploy == 'true'
        working-directory: crates/rshogi-csa-server-workers
        run: pnpm install --frozen-lockfile
      # https://github.com/SH11235/rshogi/issues/639: deploy 対象コードの provenance commit sha を `DEPLOY_TRIGGER_SHA`
      # として算出する。`github.sha` は docs-only push でも main HEAD を指してしまい、
      # drift workflow 側の `git log -1 -- <paths>` との比較が false positive になる。
      # 同義の式を drift workflow (`cloudflare-drift-check.yml`) でも使うため、path
      # リストは両 workflow で **必ず同じ集合に揃える** こと (本 file 冒頭の
      # `push.paths` と一致)。path リスト変更時は両 workflow を同時に更新する。
      - name: Compute DEPLOY_TRIGGER_SHA (staging)
        if: steps.check.outputs.can_deploy == 'true'
        id: trigger_sha
        run: |
          sha=$(git log -1 --format=%H -- \
            crates/rshogi-csa-server-workers \
            crates/rshogi-csa-server \
            crates/rshogi-csa \
            crates/rshogi-core \
            Cargo.toml \
            Cargo.lock \
            .github/workflows/deploy-workers.yml)
          if [ -z "$sha" ]; then
            echo "::error::no commit found under deploy-trigger paths; check fetch-depth in actions/checkout"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_TRIGGER_SHA=$sha"
      - name: Deploy via wrangler-action
        if: steps.check.outputs.can_deploy == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: crates/rshogi-csa-server-workers
          packageManager: pnpm
          # `--var DEPLOYED_SHA:...` で worker 側の `env.var("DEPLOYED_SHA")` に注入。
          # 値は `/health` JSON の `deployed_sha` として外部から観測可能になる。
          command: deploy --config wrangler.staging.toml --var DEPLOYED_SHA:${{ steps.trigger_sha.outputs.sha }}
      - name: sccache stats
        if: always() && steps.check.outputs.can_deploy == 'true'
        run: sccache --show-stats || true
      # smoke check は deploy 完了後に同 job 内で続けて実行する。`environment:` は
      # job 単位で解決済みなので `vars.WORKERS_HEALTH_URL` も step 内 env で読める。
      # `WORKERS_HEALTH_URL` 未設定時は warning + exit 0 で skip 相当。
      - name: Smoke check deployed worker
        if: steps.check.outputs.can_deploy == 'true'
        env:
          HEALTH_URL: ${{ vars.WORKERS_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::WORKERS_HEALTH_URL not set on rshogi-csa-server-workers-staging Environment; skipping smoke check"
            exit 0
          fi
          # Cloudflare 側の rollout は数秒〜数十秒の伝播時間がある。
          # 短い間隔で 5 回までリトライする。
          for attempt in 1 2 3 4 5; do
            echo "[attempt $attempt] curl $HEALTH_URL"
            if curl -fsS --max-time 10 "$HEALTH_URL"; then
              echo
              echo "✅ smoke check passed"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts. Investigate via 'cd crates/rshogi-csa-server-workers && vp run tail:staging'."
          exit 1

  # ---------- production -----------------------------------------------------
  # `workflow_dispatch` で `target = production` を選んだ時のみ起動する。push では
  # 走らないので、shogi engine 側の変更だけで production が deploy されることはない。
  # staging と同じく credential check → deploy → smoke を 1 job 内の step で直列
  # 実行し、Required reviewers 有効化時の承認操作を 1 dispatch = 1 回に集約する。
  deploy-production:
    name: Deploy to Cloudflare Workers (production)
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    # drain step は default 3900s (≈65min) + build/deploy ≈10min + smoke + 余裕で 90 min。
    # `force_deploy=true` のときは drain skip するので 20min 相当に収まるが、
    # 上限は同一に保ち workflow 設定を 1 通りで管理する。
    timeout-minutes: 90
    environment: rshogi-csa-server-workers-production
    env:
      RUSTFLAGS: ""
    steps:
      - name: Check Cloudflare credentials
        id: check
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$API_TOKEN" && -n "$ACCOUNT_ID" ]]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ production Cloudflare credentials configured; deploy will proceed."
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⚠️ production deploy skipped"
              echo
              echo "Environment \`rshogi-csa-server-workers-production\` の secret \`CLOUDFLARE_API_TOKEN\` / \`CLOUDFLARE_ACCOUNT_ID\` が未設定です。"
              echo
              echo "See \`docs/csa-server/deployment.md\` for initial setup."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::production deploy skipped (environment secrets not configured)."
          fi
      # `force_deploy=true` 利用時の reason を必須化。空 string なら early fail。
      # ここで弾くことで checkout / toolchain setup の billed minutes を節約する。
      # 通過時は Step Summary 1 行目に banner を出し、`::warning::` で workflow log
      # にも reason を残す。詳細は docs/csa-server/deployment.md §12 参照。
      - name: Validate force_deploy reason
        if: steps.check.outputs.can_deploy == 'true'
        env:
          FORCE_DEPLOY: ${{ inputs.force_deploy }}
          FORCE_DEPLOY_REASON: ${{ inputs.force_deploy_reason }}
        run: |
          if [[ "$FORCE_DEPLOY" == "true" && -z "$FORCE_DEPLOY_REASON" ]]; then
            echo "::error::force_deploy=true requires force_deploy_reason (non-empty string)"
            echo "::error::See docs/csa-server/deployment.md §12 for the emergency deploy procedure"
            exit 1
          fi
          if [[ "$FORCE_DEPLOY" == "true" ]]; then
            {
              echo "> ⚠️ FORCE DEPLOY (drain bypassed): $FORCE_DEPLOY_REASON"
              echo
              echo "deploy では in-flight 対局の drain を skip しています。docs/csa-server/deployment.md §12 を参照。"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::FORCE DEPLOY: drain bypassed. reason=$FORCE_DEPLOY_REASON"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.can_deploy == 'true'
        with:
          # https://github.com/SH11235/rshogi/issues/639: 同 staging job の checkout コメント参照。drift detection 用
          # DEPLOY_TRIGGER_SHA を path-aware `git log -1 --format=%H -- <paths>` で
          # 取るため full history が必要。
          fetch-depth: 0
      # in-flight 対局がゼロ件で安定するまで待つ best-effort drain。
      # `force_deploy=true` のときは skip。`WORKERS_DRAIN_URL` 未設定は
      # production 限定で fail-closed (staging は drain step を持たないので非該当)。
      # script 実体: scripts/check-csa-drain.sh。設計詳細は §12 を参照。
      - name: Drain in-flight games (production)
        # `inputs` context は typed boolean input を boolean のまま保持する
        # (`github.event.inputs` は文字列化するが今回は触らない)。GitHub Actions の
        # `==`/`!=` は loose coercion で `true == 'true'` が `1 == NaN` 扱いになり
        # 文字列比較は意図通り動かないため、`!inputs.force_deploy` で boolean を
        # 直接否定する。
        if: steps.check.outputs.can_deploy == 'true' && !inputs.force_deploy
        env:
          DRAIN_URL: ${{ vars.WORKERS_DRAIN_URL }}
          MAX_WAIT: ${{ inputs.drain_max_wait_sec }}
        run: |
          if [ -z "$DRAIN_URL" ]; then
            echo "::error::WORKERS_DRAIN_URL not set on rshogi-csa-server-workers-production Environment"
            echo "::error::Configure the variable to the live API full URL (e.g. https://...workers.dev/api/v1/games/live)"
            echo "::error::See docs/csa-server/deployment.md §12 for the configuration procedure"
            exit 1
          fi
          bash scripts/check-csa-drain.sh \
            --live-url "$DRAIN_URL" \
            --max-wait-sec "$MAX_WAIT" \
            --poll-interval-sec 30 \
            --require-stable-zero 3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        if: steps.check.outputs.can_deploy == 'true'
        with:
          toolchain: stable
      - name: Add wasm32 target to pinned toolchain
        if: steps.check.outputs.can_deploy == 'true'
        run: |
          CHANNEL=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "Adding wasm32-unknown-unknown to toolchain $CHANNEL"
          rustup target add --toolchain "$CHANNEL" wasm32-unknown-unknown
      - name: Setup sccache
        if: steps.check.outputs.can_deploy == 'true'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        if: steps.check.outputs.can_deploy == 'true'
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.check.outputs.can_deploy == 'true'
        with:
          shared-key: wasm32
      - name: Verify wrangler.production.toml exists
        if: steps.check.outputs.can_deploy == 'true'
        run: |
          test -f crates/rshogi-csa-server-workers/wrangler.production.toml || {
            echo "::error::crates/rshogi-csa-server-workers/wrangler.production.toml not found."
            echo "::error::Run from main branch with the file committed (see docs/csa-server/deployment.md)."
            exit 1
          }
      # ⚠️ バージョン更新時の二重管理に注意:
      #   `cargo install worker-build@^0.8` を `^0.9` 系に上げる場合、本キャッシュキー
      #   末尾の `v0.8` も同時に `v0.9` へ更新する必要がある。`v0.8` のままだと
      #   過去 cache が hit して 0.8.x バイナリが使われ続け、新 0.9.x が install
      #   step で skip される。インストールコマンドとキャッシュキーの **2 箇所同時更新** が必須。
      #   本 cache key は `deploy-staging` job と共有しているので、bump 時は staging /
      #   production 両方の install コマンド + key 末尾の **計 4 箇所同時更新** が必要。
      - name: Cache worker-build binary
        if: steps.check.outputs.can_deploy == 'true'
        id: cache-worker-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-${{ runner.os }}-${{ runner.arch }}-v0.8
      - name: Install worker-build
        if: steps.check.outputs.can_deploy == 'true' && steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install -q worker-build@^0.8 --locked
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        if: steps.check.outputs.can_deploy == 'true'
        with:
          package_json_file: crates/rshogi-csa-server-workers/package.json
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check.outputs.can_deploy == 'true'
        with:
          node-version-file: crates/rshogi-csa-server-workers/.node-version
          cache: 'pnpm'
          cache-dependency-path: crates/rshogi-csa-server-workers/pnpm-lock.yaml
      - name: Install Node deps (wrangler)
        if: steps.check.outputs.can_deploy == 'true'
        working-directory: crates/rshogi-csa-server-workers
        run: pnpm install --frozen-lockfile
      # https://github.com/SH11235/rshogi/issues/639: staging job 同等。詳細は staging 側のコメント参照。
      - name: Compute DEPLOY_TRIGGER_SHA (production)
        if: steps.check.outputs.can_deploy == 'true'
        id: trigger_sha
        run: |
          sha=$(git log -1 --format=%H -- \
            crates/rshogi-csa-server-workers \
            crates/rshogi-csa-server \
            crates/rshogi-csa \
            crates/rshogi-core \
            Cargo.toml \
            Cargo.lock \
            .github/workflows/deploy-workers.yml)
          if [ -z "$sha" ]; then
            echo "::error::no commit found under deploy-trigger paths; check fetch-depth in actions/checkout"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_TRIGGER_SHA=$sha"
      - name: Deploy via wrangler-action
        if: steps.check.outputs.can_deploy == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: crates/rshogi-csa-server-workers
          packageManager: pnpm
          command: deploy --config wrangler.production.toml --var DEPLOYED_SHA:${{ steps.trigger_sha.outputs.sha }}
      - name: sccache stats
        if: always() && steps.check.outputs.can_deploy == 'true'
        run: sccache --show-stats || true
      - name: Smoke check deployed worker
        if: steps.check.outputs.can_deploy == 'true'
        env:
          HEALTH_URL: ${{ vars.WORKERS_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::WORKERS_HEALTH_URL not set on rshogi-csa-server-workers-production Environment; skipping smoke check"
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            echo "[attempt $attempt] curl $HEALTH_URL"
            if curl -fsS --max-time 10 "$HEALTH_URL"; then
              echo
              echo "✅ smoke check passed"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts. Investigate via 'cd crates/rshogi-csa-server-workers && vp run tail:prod'."
          exit 1
