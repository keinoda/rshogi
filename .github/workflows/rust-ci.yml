name: Rust CI

on:
  push:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  # `.cargo/config.toml` の `target-cpu=native` を CI では無効化する。
  # CI ランナーの CPU 世代（Skylake / Ice Lake / Cascade Lake 等）と sccache の
  # 組み合わせで、片方の CPU でビルドされたキャッシュエントリが別 CPU の
  # runner で実行されて SIGILL（`Compile terminated by signal 4`）で落ちる
  # flaky を起こしていた。CI では CPU 固有命令を出さない `x86-64-v2` 相当の
  # 保守的な baseline を指定し、sccache エントリを CPU 非依存にする。
  # ローカル開発の `target-cpu=native` は `.cargo/config.toml` 側で維持され、
  # CI のみがこの env で override される（env の方が `.cargo/config.toml` の
  # rustflags より precedence が高い）。
  RUSTFLAGS: "-C target-cpu=x86-64-v2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust_code: ${{ steps.filter.outputs.rust_code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust_code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '.cargo/**'
              - '.github/workflows/rust-ci.yml'
              - '!docs/**'
              - '!runs/**'
              - '!logs/**'
              - '!target/**'
              - '!data/**'
              - '!memo/**'
              - '!**/*.md'
              - '!**/*.mdx'

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Run tests
        run: cargo test --release --workspace -- --test-threads=2
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings

  wasm-build:
    # Workers crate (`rshogi-csa-server-workers`) の wasm32-unknown-unknown ビルドを検査する。
    #
    # 既存 `lint` / `test` job は host target でしか動かないため、
    # `#[cfg(target_arch = "wasm32")]` 配下のコード（`game_room.rs` / `router.rs` /
    # `lib.rs` の本体）は merge 前に検証されない。本番 deploy 直前の
    # `worker-build --release` で初めて wasm32 ビルド退行が発覚する運用を防ぐため、
    # PR チェックで wasm32 ビルド検査を並走させる。
    #
    # `cargo check` ではなく `cargo build` を使う:
    #   `cargo check` は MIR 生成までで止まり codegen 段の退行（wasm-bindgen の
    #   symbol 衝突・`getrandom` の wasm_js feature 不足・lld link error 等）を
    #   検知できない。本 job の目的は「`worker-build --release` で初めて発覚する
    #   退行を PR で止める」なので codegen を通す build を使う。
    #
    # mold / clang を入れない:
    #   wasm32 は lld でリンクするため、host job (`lint` / `test`) が入れている
    #   mold linker は不要。runner セットアップ時間を浪費しない。
    #
    # clippy を回さない:
    #   clippy は host target の `lint` job で全 crate を網羅済み。本 job の責務は
    #   「Workers crate の wasm32 ビルドが通ること」の回帰検知に限定し、
    #   `rshogi-core` の wasm32 clippy 整理など別 crate 範囲の lint 課題は扱わない。
    name: Workers wasm32 Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 20
    env:
      # workflow 上位の `-C target-cpu=x86-64-v2` は x86 専用で wasm32 では
      # `'x86-64-v2' is not a recognized processor for this target (ignoring processor)`
      # 警告がコンパイル単位ごとに大量出力される。本 job では空文字で上書きし、
      # wasm32 標準の codegen に任せる（host target 用の baseline 設定の意図とも整合）。
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Add wasm32 target to pinned toolchain
        # `rust-toolchain.toml` が channel を 1.93.1 に pin しているため、
        # cargo は dtolnay/rust-toolchain@stable が install した stable (1.95.0) では
        # なく rust-toolchain.toml の channel を使う（`rustup show active-toolchain` で
        # 確認できる）。dtolnay action の `targets:` パラメータは default toolchain
        # （= stable）にのみ wasm32 target を追加するため、cargo の実行時には反映
        # されない（`E0463: can't find crate for core` でビルドが落ちる）。
        # rust-toolchain.toml の channel から動的に値を取り、その toolchain に
        # 明示的に wasm32 target を追加する。channel が変わったら自動追従する。
        run: |
          CHANNEL=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "Adding wasm32-unknown-unknown to toolchain $CHANNEL"
          rustup target add --toolchain "$CHANNEL" wasm32-unknown-unknown
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          # host target キャッシュ (`lint` / `test` job) と完全分離する。
          # `shared-key` 指定で本 job 専用のキャッシュ namespace を確保し、
          # 同 base key 配下に host target sysroot が混入しないようにする。
          shared-key: wasm32
      - name: Build wasm32
        run: cargo build -p rshogi-csa-server-workers --target wasm32-unknown-unknown
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  simd-runtime:
    # NNUE の SIMD propagate 経路 (AVX2 / AVX-512 / AVX-512VNNI) を Intel SDE で
    # エミュレート実行し、各経路の数値正しさを検証する。
    #
    # なぜ SDE か:
    #   GitHub-hosted runner の CPU 世代は不定で AVX-512 を持つ保証がなく、
    #   workflow 上位の `target-cpu=x86-64-v2` baseline も「別 CPU でビルドした
    #   キャッシュを別 runner で実行して SIGILL する」flaky を避けるための保守設定。
    #   結果として既存 job は SSSE3 経路しか実行検証していない。SDE は任意 ISA を
    #   任意 host でエミュレート実行できるため、専用ハード無しで本番相当の経路を
    #   決定的に検証できる。target-cpu とエミュレートする chip を対にして、各 cfg 経路
    #   (AVX-512 は VNNI 有無で別実装) を個別に通す。
    #
    # RUSTFLAGS の扱い:
    #   build script / proc-macro は host で実行されるため、高 ISA 命令を出すと runner で
    #   SIGILL する。`--target x86_64-unknown-linux-gnu` を明示してターゲット成果物のみ
    #   `CARGO_TARGET_<triple>_RUSTFLAGS` で高 ISA 化する (build-deps は host 既定フラグの
    #   まま)。cargo の rustflags は単一ソースのみ採用し、`RUSTFLAGS` が set (空文字含む)
    #   だと `CARGO_TARGET_<triple>_RUSTFLAGS` が無視されるため、step 内で `RUSTFLAGS` を
    #   unset してから cargo を呼ぶ。
    name: SIMD runtime (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    # SDE エミュレーションは遅いが対象は rshogi-core の単体テストのみで短時間。余裕を見た上限。
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: avx2
            cpu: haswell
            chip: hsw
          - label: avx512
            cpu: skylake-avx512
            chip: skx
          - label: avx512vnni
            cpu: icelake-server
            chip: icx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # mold linker は .cargo/config.toml で wired されていないため install しない
      # (rshogi-core のみのリンクで効果が無く runner setup 時間を浪費するだけ)。
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup Intel SDE
        uses: petarpetrovt/setup-sde@31aa4a8e85e109bef00f1d838613fcc6ec421271 # v5.0
        with:
          sdeVersion: 10.8.0
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          # host baseline (`lint` / `test`) や wasm32 とキャッシュ namespace を分離する。
          # target-cpu を明示するため成果物は CPU 非依存で、別 runner 実行でも SIGILL しない。
          shared-key: simd-${{ matrix.label }}
      - name: Build & run rshogi-core tests under SDE
        run: |
          set -euo pipefail
          # SDE バイナリ配置を先に検証し、レイアウト相違時に原因を即特定する。
          test -x "$SDE_PATH/sde64" || { echo "sde64 not found under SDE_PATH=$SDE_PATH"; ls -la "$SDE_PATH" || true; exit 1; }
          # RUSTFLAGS が set だと CARGO_TARGET_<triple>_RUSTFLAGS が無視されるため unset。
          unset RUSTFLAGS CARGO_ENCODED_RUSTFLAGS
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-cpu=${{ matrix.cpu }}"
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -${{ matrix.chip }} --"
          cargo test -p rshogi-core --lib --target x86_64-unknown-linux-gnu -- --test-threads=2
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  nnue-wasm-runtime:
    # rshogi-core の NNUE AffineTransform は重み格納レイアウトを target ごとに
    # 切り替える（x86 AVX2/SSSE3 はスクランブル形式、wasm SIMD / スカラーは行優先）。
    # host job (`test`) と simd-runtime job は x86 経路しか実行しないため、wasm SIMD128
    # 経路と wasm スカラー fallback の数値正当性は CI で検証されない。affine_reference
    # テストは格納→読み出しを行優先参照と bit 一致で照合する target 非依存テストなので、
    # wasm32-wasip1 + wasmtime で実行して wasm 経路のレイアウト整合を回帰検知する。
    # +simd128（SIMD128 経路）と simd128 無し（スカラー fallback）の両方を走らせる。
    name: NNUE wasm32 Runtime Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 20
    env:
      # wasm32 では host 用 baseline (`-C target-cpu=x86-64-v2`) が無効なので空で上書きする。
      # simd128 を有効化する step は個別に RUSTFLAGS を指定する。
      RUSTFLAGS: ""
      # wasm32-wasip1 のテストバイナリは wasmtime 経由で実行する。
      CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Add wasm32-wasip1 target to pinned toolchain
        # rust-toolchain.toml が channel を pin しているため、その toolchain に
        # wasm32-wasip1 target を明示的に追加する（wasm-build job と同じ理由）。
        run: |
          CHANNEL=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "Adding wasm32-wasip1 to toolchain $CHANNEL"
          rustup target add --toolchain "$CHANNEL" wasm32-wasip1
      - name: Install wasmtime
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: wasmtime
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          # host / wasm32-unknown キャッシュと混在させないため専用 namespace を確保する。
          shared-key: wasm32-wasip1
      - name: Run NNUE layout tests on wasm (SIMD128 path)
        run: cargo test -p rshogi-core nnue::layers --target wasm32-wasip1
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
      - name: Run NNUE layout tests on wasm (scalar fallback)
        run: cargo test -p rshogi-core nnue::layers --target wasm32-wasip1
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  abs-paths:
    # tracked file に machine 依存の絶対パスが混入していないか検査する
    # (検出対象の具体は scripts/check-tracked-abs-paths.sh を参照)。docs / skills を
    # 含む全 tracked file が対象なので changes フィルタを通さず PR ごとに常に走らせる
    # (grep のみで toolchain 不要)。
    name: No machine-absolute paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check tracked files for machine-absolute paths
        run: bash scripts/check-tracked-abs-paths.sh
