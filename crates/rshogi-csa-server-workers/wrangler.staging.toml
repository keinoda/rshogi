# Cloudflare Workers staging デプロイ設定 (CI 経由 `wrangler deploy` で使用)。
#
# - 本ファイルは VCS で追跡される。`account_id` / `CLOUDFLARE_API_TOKEN` 等の
#   秘匿情報は **入れない**。これらは GitHub Environments の secret から CI
#   runtime で env 経由で注入する (`CLOUDFLARE_ACCOUNT_ID` /
#   `CLOUDFLARE_API_TOKEN`、staging environment 側に登録された値)。
# - bucket 名 / Origin / 時計設定など秘匿情報でない値はそのままコミットする。
# - 本ファイルは production (`wrangler.production.toml`) と同じ shape を維持し、
#   `name` と R2 `bucket_name` のみ staging 専用値に書き換える。値の意味と
#   `[vars]` 各キーの意図は production toml の同等行に合わせる（差分は最小化）。
# - 値変更手順 / 初回セットアップ手順は `docs/csa-server/deployment.md` を参照。

name = "rshogi-csa-server-workers-staging"
main = "build/worker/shim.mjs"
# 通常は production と日付を揃え、新フラグ採用は両環境同時に bump する運用で
# 挙動差を最小化する。staging で先に新 flag の挙動を観察してから production に
# 反映したい場合に限り、本値を意図的に production より先行させて良い（その場合
# 観察期間中は staging / production で compatibility 動作が乖離する点に注意）。
compatibility_date = "2026-04-21"

# `logpush = true` は本 Worker のログを `workers_trace_events` dataset に流す
# (Cloudflare Logpush が consume できる) ようにする。LogpushJob 側 (Pulumi declare、
# `infra/pulumi/index.ts`) と本フラグの両方が揃って初めて R2 archive にログが
# 落ちる。詳細は `docs/csa-server/observability.md` §1 / §3 を参照。
# [#625 Phase B / PR #698]
#
# 2026-05-10 検証で判明: Workers Free plan は `logpush` フラグ自体が deploy gate
# で reject される (`code 10023: You do not have access to use Logpush`)。
# **「Free plan で no-op」は誤りで、deploy 自体が落ちるため Free plan では
# コメントアウト必須**。Paid plan 移行時に下行のコメントを外して有効化する。
# production toml と挙動を揃えるため staging も同設定 (`docs/csa-server/observability.md`
# §3.2 / §7.3 参照)。
# logpush = true

# Workers Observability を有効化 (Free plan 対応)。production toml の同 block と
# 同設定で揃え、staging で alert rule の動作確認 → production 反映の運用とする。
# 詳細は `docs/csa-server/observability.md` §6.1 を参照。
# [#625 Phase B 続編 / PR (本 PR)]
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1.0

# CI 環境では事前に `cargo install -q worker-build@^0.8 --locked` がインストール済みの
# 前提（`.github/workflows/deploy-workers.yml` の独立 step `Install worker-build` で
# `actions/cache` 経由 hit 時 skip + miss 時 install を行う）。本ファイルは
# `worker-build --release` のみを実行することで、CI 1 回 deploy あたりの時間を短縮する。
[build]
command = "worker-build --release"

# --- Durable Objects ---
# GameRoom: 1 room_id = 1 DO インスタンス。`id_from_name(room_id)` で決定論解決。
# Worker `name` が staging 専用なので DO namespace も自動で staging 隔離される
# （production の GameRoom storage には触れない）。
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

# Lobby: マッチング待機キューとペアリング判定を担当する 1 instance 固定 DO。
# `id_from_name("default")` で routing する。in-memory queue のみ保持し、
# Hibernation 復帰時は client が再 LOGIN_LOBBY する想定で永続化はしない。
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

# RateLimiter: per-(kind, identifier) で sharding する atomic token bucket
# (issue #622 PR3a)。LOGIN_LOBBY / CHALLENGE_LOBBY / `/ws/<room_id>` upgrade /
# room create の 6 種類の rate limit を共通実装で担う。
# 詳細は `docs/csa-server/rate_limit.md` 参照。
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# SQLite-backed DO: `state.storage().sql()` を利用するため必須。
# 本 migration tag は **初回 deploy 時にのみ apply される**。`new_sqlite_classes` の
# 内容を変更する場合は新 tag (`v2` / `v3` ...) を **追加する** こと。既存 tag を
# 編集しても無視される。staging / production で migration 履歴は独立しているため、
# 同じ tag を両環境で持っていても干渉しない。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Lobby を SQLite-backed として追加 (storage 利用予定はないが将来の queue TTL 永続化
# 等を見据えて SQLite クラスとして登録しておく)。
[[migrations]]
tag = "v2"
new_sqlite_classes = ["Lobby"]

# RateLimiter を SQLite-backed として追加 (issue #622 PR3a)。実体は
# `state.storage().get/put` で 1 bucket 分の `TokenBucketState` (~16 byte JSON)
# を読み書きするだけで SQLite 機能は使わない。`additive-only contract`
# (`docs/csa-server/deployment.md` §3.4.1) に従い既存 tag (v1, v2) は触らず、
# 新 tag = "v3" として add する (= forward-only)。
[[migrations]]
tag = "v3"
new_sqlite_classes = ["RateLimiter"]

# --- R2: 棋譜保存 ---
# `GameRoom` DO が終局時に CSA V2 棋譜を書き出す先。staging 用 bucket は事前に
# Cloudflare 上で作成しておく必要がある:
#   wrangler r2 bucket create rshogi-csa-kifu-staging
# 命名規約 (Cloudflare): 小文字英数字 + ハイフン、3〜63 文字、先頭末尾は英数字。
[[r2_buckets]]
binding = "KIFU_BUCKET"
bucket_name = "rshogi-csa-kifu-staging"

# --- R2: Floodgate 履歴保存 ---
#   wrangler r2 bucket create rshogi-csa-floodgate-history-staging
[[r2_buckets]]
binding = "FLOODGATE_HISTORY_BUCKET"
bucket_name = "rshogi-csa-floodgate-history-staging"

# --- Cron triggers ---
# `[event(scheduled)]` ハンドラ (`lib.rs::scheduled`) を単一 cron で起動する。
# Cloudflare の account あたり cron trigger 上限 (5) に収めるため、以前の
# backfill 用 (`0 * * * *`) と sweep-only 用 (`15,30,45 * * * *`) の 2 cron を
# 1 cron に統合した。
#
# 単一 cron `0,15,30,45 * * * *` は 0 / 15 / 30 / 45 分の 4 回発火する:
#
# - 0 分:
#   `kifu-by-id/<id>.meta.json` から `games-index/` を補完 (backfill) し、
#   `live-games-index/` の orphan を掃除する。backfill は 1 run = 1 page
#   (1000 件) のみ。
# - 15 / 30 / 45 分:
#   `live-games-index/` の orphan 掃除のみを行う (backfill はスキップ)。
#   delete best-effort 失敗からの復旧遅延を 1 時間 → 15 分に短縮するため、
#   sweep のみ高頻度化する。sweep は 1 cron 内で pagination loop し、
#   cron 30s 制限内で複数 page を処理する。
#
# 単一 cron なので発火の区別は cron 文字列でできない。`lib.rs::scheduled` が
# `event.schedule()` 由来の「時の何分か」を見て分岐する。cron 文字列を変更する
# 場合は `lib.rs` の `SCHEDULED_CRON` 定数も同期更新すること (wrangler test が
# 違反を検知する)。分フィールドには必ず `BACKFILL_MINUTE` (0) を含めること —
# 0 分を外すと backfill が無音で永久停止する (sweep は全発火で走る)。
[triggers]
crons = ["0,15,30,45 * * * *"]

# --- 環境変数 ---
# `[vars]` の値は機密でないが、staging client の Origin に応じて運用者が更新する。
# 値変更は通常の PR で行い、merge → 自動 deploy で反映される。
[vars]
# WebSocket Upgrade 時の Origin 許可リスト（カンマ区切り）。ブラウザ経由
# （Origin ヘッダ付き）に対する CSRF 防御として機能する。
# 空文字列・未設定時はブラウザ経由を全 403、Origin ヘッダを送らない
# ネイティブ CSA クライアントは素通し。
# staging では本リポ csa_client の `ws_origin` 既定値 (`https://csa-client-local`)
# と staging web client + Tauri desktop の Origin を併記する。
# Tauri desktop は OS 別 Origin (`tauri://localhost` / `https://tauri.localhost`)
# を webview から自動付与するため、両方を登録する。
WS_ALLOWED_ORIGINS = "https://stg.ramu-shogi.sh11235.com,https://csa-client-local,tauri://localhost,https://tauri.localhost"

# 対局時計の方式と値。
# - `countdown`: CSA 2014 改訂互換、整数秒切り捨て、Floodgate 互換 (`Time_Unit:1sec`)。
# - `countdown_msec`: ms 粒度の短時間対局向け拡張 (`Time_Unit:1msec`)。
#   本リポ独自で本家 Floodgate には無い。staging では実機 E2E と CI E2E を素早く回す
#   ために CountdownMsec で `byoyomi=100ms` 程度に短縮する運用。
# - `fischer`: 秒単位の増分加算。
# - `stopwatch`: 分単位切り捨ての shogi-server 旧挙動。
#
# 各バリアントが参照する env 変数:
#   countdown      → TOTAL_TIME_SEC / BYOYOMI_SEC
#   countdown_msec → TOTAL_TIME_MS  / BYOYOMI_MS
#   fischer        → TOTAL_TIME_SEC / BYOYOMI_SEC (BYOYOMI_SEC は increment)
#   stopwatch      → TOTAL_TIME_MIN / BYOYOMI_MIN
# 各方式の値フィールドと CLOCK_PRESETS 仕様は `docs/csa-server/clock_defaults.md` を参照。
CLOCK_KIND = "countdown_msec"
# countdown 系（参照されない側も SHARED_PUBLIC_VARS_KEYS の整合性のため宣言する）。
TOTAL_TIME_SEC = "600"
BYOYOMI_SEC = "10"
# countdown_msec で使う実値: 持ち時間 10 秒、秒読み 100ms（実機 E2E と CI E2E で
# 1 局を数秒〜十数秒で完走させる速度を狙う）。
TOTAL_TIME_MS = "10000"
BYOYOMI_MS = "100"
# stopwatch 系（参照されない）。
TOTAL_TIME_MIN = "10"
BYOYOMI_MIN = "1"

# `game_name` 別の時計プリセット（JSON 配列文字列）。空配列で「プリセット未宣言」、
# 1 件以上登録すると strict mode（未登録 game_name は LOGIN_LOBBY:incorrect
# unknown_game_name で拒否）。命名規則: `byoyomi-<total_sec>-<byoyomi_sec>` /
# `byoyomi-msec-<total_sec>-<byoyomi_ms>` / `fischer-<total_sec>-<increment_sec>F` /
# `floodgate-<total_sec>-<byoyomi_sec>` (Floodgate 互換 alias)。
# staging / production で同じ preset セットを宣言し、game_name 切替で短時間 / 中時間 /
# 長時間 (Floodgate 互換) の clock を選べる構成にする。設計と各 preset の用途は
# `docs/csa-server/clock_defaults.md` 参照。
CLOCK_PRESETS = '''[
  {"game_name":"byoyomi-msec-10-100","kind":"countdown_msec","total_time_ms":10000,"byoyomi_ms":100},
  {"game_name":"byoyomi-120-5","kind":"countdown","total_time_sec":120,"byoyomi_sec":5},
  {"game_name":"floodgate-600-10","kind":"countdown","total_time_sec":600,"byoyomi_sec":10}
]'''

# 切断時の再接続猶予秒数。`0` または未設定で再接続プロトコルを無効化（保守的既定）。
# `> 0` を指定する構成は ALLOW_FLOODGATE_FEATURES=true との同時設定が必須。
# staging では reconnect protocol / history bucket / rating 応答などの Floodgate 系
# 拡張機能を実機通電させるため 30 秒に設定する。値の根拠: 手動 kill→再起動で
# `id` 文字列を組み立て直す operator 余裕 (10〜15 秒) と短時間ネットワーク blip の
# 吸収を兼ねる経験的下限。production 昇格時は実運用 client の再接続所要時間を
# 計測してから再評価する。
RECONNECT_GRACE_SECONDS = "30"
# LOGIN OK 後の AGREE 待ち TTL (秒)。両者 AGREE 前に片方が刺さった対局を DO 上
# から自動解放する (https://github.com/SH11235/rshogi/issues/600)。staging では E2E をテンポよく回すため短めの
# 30 秒で運用し、production 昇格時に 60 秒へ揃える運用とする。`0` / 未設定 /
# 非数値は 60 秒既定にフォールバック。
AGREE_TIMEOUT_SECONDS = "30"
ALLOW_FLOODGATE_FEATURES = "true"
# viewer 配信 API (`/api/v1/games*` HTTP, `/ws/<id>/spectate` WS) を opt-in 有効化する。
# staging は実機通電 (web client / spectator E2E) を回す前提で `"1"` を既定とする。
# 即時無効化したい場合は本値を `"0"` に切り替えて redeploy する（kill-switch）。
ALLOW_VIEWER_API = "1"
# LobbyDO 内 in-memory queue の総数上限。staging では小規模通電向けに 100 で運用。
LOBBY_QUEUE_SIZE_LIMIT = "100"
# 公開マッチング queue の entry TTL (秒)。staging は smoke / E2E をテンポよく回す
# ため短めの 60 秒に設定する (Issue #631)。本値を超えても `LOBBY_PONG` 受信で
# 延長されるため、heartbeat 実装後はそのまま使える。production 昇格時は 300 秒
# に揃える。`0` / 未設定 / 非数値は 300 秒既定にフォールバック。
LOBBY_QUEUE_ENTRY_TTL_SEC = "60"
# 私的対局 (CHALLENGE_LOBBY) で発行される token の TTL (秒)。staging は通電
# 確認をテンポよく回すため短めの 600 秒 (10 分) で運用する。production 昇格
# 時は 3600 秒に揃える。
CHALLENGE_TTL_SEC = "600"
# 私的対局 (CHALLENGE_LOBBY / LOGIN_LOBBY+private-<token>+free) 経路の opt-in
# 有効化フラグ (https://github.com/SH11235/rshogi/issues/635)。両者揃った後の
# 対局起動経路 (consume → GameRoom DO 起動) が未実装の現状、staging では起動
# 経路実装の動作確認 (E2E 通電) を回す前提で `"true"` を既定とする。production
# は fail-closed で `"false"` 既定 (production toml 側参照)。
PRIVATE_CHALLENGE_ENABLED = "true"

# --- Rate limit / abuse protection (issue #622 PR3a) ---
# 各値は **1 IP / 1 handle あたり 1 分間の最大試行回数**。staging では smoke /
# E2E をテンポよく回すため production と同じ閾値で運用する (`PRIVATE_CHALLENGE_ENABLED`
# のように staging だけ緩める必要はない - rate limit は flood 防御目的で
# burst 値が小さくても通常 E2E には影響しない閾値設計)。
# 閾値の根拠 / 調整指針は `docs/csa-server/rate_limit.md` 参照。
LOBBY_LOGIN_RATE_PER_IP_PER_MIN = "10"
LOBBY_LOGIN_RATE_PER_HANDLE_PER_MIN = "5"
LOBBY_CHALLENGE_RATE_PER_IP_PER_MIN = "5"
LOBBY_CHALLENGE_RATE_PER_HANDLE_PER_MIN = "3"
ROOM_CREATE_RATE_PER_IP_PER_MIN = "20"
WS_ROOM_UPGRADE_RATE_PER_IP_PER_MIN = "60"

# --- secret として設定する値 ---
# staging で必要だが OSS repo には書かない値は `wrangler secret put` 経由で設定する。
# 実値は Cloudflare 側の secret store にのみ存在し、`env.var(name)` 経由で
# `[vars]` と同じ namespace から Worker code が読む（Cloudflare 仕様）。
#
# - ADMIN_API_TOKEN: WS 内 admin command (`%%ADMIN <token>`,
#   https://github.com/SH11235/rshogi/issues/621) や将来の HTTP admin endpoint の
#   認可基盤として `crate::admin_auth` から参照される 1 本の static API token
#   (Floodgate audit https://github.com/SH11235/rshogi/issues/560 由来)。
#   production と異なる値にすることで「staging で漏れた token が production に
#   通用しない」分離を保つ。
#   設定: `vp exec wrangler secret put ADMIN_API_TOKEN --config wrangler.staging.toml`
#   確認: `vp exec wrangler secret list --config wrangler.staging.toml`
#   rotation / token 生成手順は `docs/csa-server/admin_auth.md` 参照。
#
# 旧 ADMIN_HANDLE (handle 自称 = admin 権限) は #621 で廃止された。Cloudflare 側に
# secret として残っていれば `wrangler secret delete ADMIN_HANDLE --config
# wrangler.staging.toml` で除去してよい。
